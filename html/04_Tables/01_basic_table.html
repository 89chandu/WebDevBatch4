<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Table</title>
</head>
<body>
    <h2>Student Details</h2>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John</td>
            <td>20</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Alice</td>
            <td>22</td>
            <td>London</td>
        </tr>
    </table>
</body>
</html>
