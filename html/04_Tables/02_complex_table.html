<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Table</title>
</head>
<body>
    <h2>Monthly Savings</h2>
    <table border="1" cellpadding="8" cellspacing="0" width="50%">
        <thead>
            <tr>
                <th>Month</th>
                <th>Savings</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>$100</td>
            </tr>
            <tr>
                <td>February</td>
                <td>$80</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td><b>Total</b></td>
                <td><b>$180</b></td>
            </tr>
            <tr>
                <td colspan="2" align="center">Good job!</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
