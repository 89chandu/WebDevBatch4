<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting</title>
</head>
<body>
    <h1>Text Formatting Tags</h1>
    <p><b>Bold Text</b> and <strong>Strong Text (Semantic)</strong></p>
    <p><i>Italic Text</i> and <em>Emphasized Text (Semantic)</em></p>
    <p><mark>Highlighted Text</mark></p>
    <p>H<sub>2</sub>O (Subscript) and X<sup>2</sup> (Superscript)</p>
</body>
</html>
