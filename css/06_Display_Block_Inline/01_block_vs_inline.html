<!DOCTYPE html>
<html>
<head>
    <style>
        .block-el { background-color: lightblue; border: 1px solid blue; padding: 10px; margin: 5px; }
        .inline-el { background-color: lightgreen; border: 1px solid green; padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h2>Block vs Inline Elements</h2>
    
    <h3>Block Elements (take full width)</h3>
    <div class="block-el">Div 1</div>
    <div class="block-el">Div 2</div>
    
    <h3>Inline Elements (take only necessary width)</h3>
    <span class="inline-el">Span 1</span>
    <span class="inline-el">Span 2</span>
</body>
</html>
