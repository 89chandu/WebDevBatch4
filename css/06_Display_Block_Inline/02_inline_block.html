<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            display: inline-block;
            width: 100px;
            height: 100px;
            background-color: purple;
            color: white;
            text-align: center;
            line-height: 100px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h2>Inline-Block</h2>
    <p>inline-block elements sit next to each other like inline elements, but you can set width and height like block elements.</p>
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</body>
</html>
