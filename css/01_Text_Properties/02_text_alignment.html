<!DOCTYPE html>
<html>
<head>
    <style>
        .center-text { text-align: center; }
        .right-text { text-align: right; }
        .justify-text { 
            text-align: justify; 
            line-height: 1.8; 
            text-decoration: underline; 
            text-decoration-color: red;
        }
    </style>
</head>
<body>
    <h2 class="center-text">Centered Heading</h2>
    <p class="right-text">This text is aligned to the right.</p>
    <p class="justify-text">This text is justified. It will spread out to fill the entire width of the container, making the left and right edges flush. The line height is also increased for better readability.</p>
</body>
</html>
