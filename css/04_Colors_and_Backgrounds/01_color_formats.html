<!DOCTYPE html>
<html>
<head>
    <style>
        .name { color: red; }
        .hex { color: #ff0000; }
        .rgb { color: rgb(255, 0, 0); }
        .rgba { background-color: rgba(0, 0, 255, 0.3); padding: 10px; } /* With opacity */
        .hsl { color: hsl(120, 100%, 25%); }
    </style>
</head>
<body>
    <h2>Color Formats</h2>
    <h3 class="name">Red color using name</h3>
    <h3 class="hex">Red color using HEX</h3>
    <h3 class="rgb">Red color using RGB</h3>
    <h3 class="hsl">Green color using HSL</h3>
    <div class="rgba">Blue background with 30% opacity (RGBA)</div>
</body>
</html>
