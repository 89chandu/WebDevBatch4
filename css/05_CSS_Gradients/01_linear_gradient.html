<!DOCTYPE html>
<html>
<head>
    <style>
        .grad-box-1 {
            height: 150px;
            background: linear-gradient(to right, red, yellow);
            margin-bottom: 20px;
        }
        .grad-box-2 {
            height: 150px;
            background: linear-gradient(45deg, #4f46e5, #ec4899);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h2>Linear Gradients</h2>
    <div class="grad-box-1"></div>
    <div class="grad-box-2">45 Degree Gradient</div>
</body>
</html>
