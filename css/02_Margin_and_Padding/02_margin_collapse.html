<!DOCTYPE html>
<html>
<head>
    <style>
        .box-1 {
            background-color: coral;
            margin-bottom: 50px;
            padding: 20px;
        }
        .box-2 {
            background-color: lightgreen;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h2>Margin Collapsing</h2>
    <p>The margin between these two boxes will be 50px (the larger of 50px and 30px), not 80px.</p>
    <div class="box-1">Box 1 (margin-bottom: 50px)</div>
    <div class="box-2">Box 2 (margin-top: 30px)</div>
</body>
</html>
