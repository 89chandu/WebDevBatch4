<!DOCTYPE html>
<html>
<head>
    <style>
        .container { width: 80%; background-color: #eee; padding: 20px; margin: 0 auto; }
        .child-50 { width: 50%; background-color: tomato; color: white; padding: 10px; }
        .child-100 { width: 100%; background-color: dodgerblue; color: white; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Percentage Units (%)</h2>
        <div class="child-50">This takes 50% of the parent container.</div>
        <div class="child-100">This takes 100% of the parent container.</div>
    </div>
</body>
</html>
