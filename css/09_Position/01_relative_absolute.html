<!DOCTYPE html>
<html>
<head>
    <style>
        .parent {
            position: relative;
            width: 300px;
            height: 300px;
            border: 2px solid black;
            background-color: #f9f9f9;
        }
        .child {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: tomato;
            color: white;
            padding: 15px;
        }
    </style>
</head>
<body>
    <h2>Relative & Absolute Positioning</h2>
    <p>The child is positioned absolutely relative to its parent.</p>
    <div class="parent">
        Parent (Relative)
        <div class="child">Child (Absolute - Top Right)</div>
    </div>
</body>
</html>
