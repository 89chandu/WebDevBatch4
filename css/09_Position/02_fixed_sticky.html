<!DOCTYPE html>
<html>
<head>
    <style>
        body { height: 1500px; }
        .fixed-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .sticky-header {
            position: sticky;
            top: 0;
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sticky-header">I am Sticky Header. Scroll down!</div>
    <h2>Fixed & Sticky Positioning</h2>
    <p>Scroll the page to see the effects.</p>
    <p>The green button stays in the bottom right corner (Fixed).</p>
    <p>The blue header sticks to the top when you scroll past it (Sticky).</p>
    <div class="fixed-btn">Chat Support</div>
</body>
</html>
